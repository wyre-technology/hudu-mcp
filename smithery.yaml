# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - huduApiKey
      - huduBaseUrl
    properties:
      huduApiKey:
        type: string
        description: Your Hudu API key
      huduBaseUrl:
        type: string
        description: Your Hudu instance base URL
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/entry.js'], env: { HUDU_API_KEY: config.huduApiKey, HUDU_BASE_URL: config.huduBaseUrl, MCP_TRANSPORT: 'stdio' } })
